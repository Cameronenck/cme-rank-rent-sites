<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Request Received | Ohio HVAC Pros</title>
<meta name="robots" content="noindex,nofollow">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#1a3a52;--orange:#E8622A;--font:'DM Sans',sans-serif;--heading:'Barlow Condensed',sans-serif}
body{font-family:var(--font);background:#f8f9fa;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border-radius:12px;padding:48px 40px;max-width:540px;width:100%;text-align:center;box-shadow:0 4px 32px rgba(0,0,0,.10);border-top:4px solid var(--orange)}
.icon{width:64px;height:64px;background:#e8f5e9;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
.icon svg{width:32px;height:32px;fill:#2e7d32}
h1{font-family:var(--heading);font-size:clamp(28px,5vw,38px);font-weight:800;text-transform:uppercase;color:var(--navy);margin-bottom:16px;line-height:1.1}
p{font-size:16px;color:#4a5568;line-height:1.7;margin-bottom:24px}
.call-btn{display:inline-flex;align-items:center;gap:10px;background:var(--orange);color:#fff;padding:16px 32px;border-radius:6px;text-decoration:none;font-family:var(--heading);font-size:18px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;transition:background .2s}
.call-btn:hover{background:#c94f1e}
.call-btn svg{width:20px;height:20px;fill:#fff}
.home-link{display:block;font-size:14px;color:var(--navy);text-decoration:none;font-weight:600}
.home-link:hover{text-decoration:underline}
@media(max-width:480px){.card{padding:32px 20px}}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap">
</head>
<body>
<div class="card">
  <div class="icon">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
  </div>
  <h1>Your Request Has Been Received</h1>
  <p>A licensed Ohio HVAC contractor will contact you within 2 hours. For immediate service, call us now:</p>

    614-344-4851
  </a>
  <a href="/" class="home-link">Return to Ohio HVAC Pros homepage</a>
</div>
</body>
</html>
